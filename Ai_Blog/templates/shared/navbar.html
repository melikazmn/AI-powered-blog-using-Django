<!-- templates/shared/navbar.html -->
<nav class="navbar">
    <div class="nav-container">
        <a href="{% url 'blog:post_list' %}" class="navbar-brand">AI Blog</a>
        
        <div class="navbar-menu">
            {% if user.is_authenticated %}
                <a href="{% url 'blog:post_list' %}" class="nav-link {% if request.resolver_match.url_name == 'post_list' %}active{% endif %}">Home</a>
                <a href="{% url 'blog:post_create' %}" class="nav-link {% if request.resolver_match.url_name == 'post_create' %}active{% endif %}">Create Post</a>
                <a href="#" class="nav-link">Profile</a>
                <form method="post" action="#" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'account:login' %}" class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}">Login</a>
                <a href="{% url 'account:register' %}" class="nav-link {% if request.resolver_match.url_name == 'register' %}active{% endif %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
